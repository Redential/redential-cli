name: CI

# Runs on every PR (including from forks) and every push to main. This
# workflow never references `secrets.*` anywhere below — `pull_request`
# (not `pull_request_target`) already withholds repository secrets from a
# fork's PR by default, and not referencing any here means there's nothing
# for a future edit to leak even if that changed. `permissions: contents:
# read` below is the same belt-and-suspenders idea for the GITHUB_TOKEN.
# Publishing lives entirely in release.yml, gated on a `v*` tag instead.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

  # The 20,000-commit perf/memory suite (test/slow/) — excluded from the
  # matrix job's `npm test` above (package.json) since it's slow enough,
  # and narrow enough in what it proves (huge-repo scan time and memory),
  # that it shouldn't gate every OS/Node cell. Runs on ubuntu-latest only —
  # the goal is proving the 60s budget holds somewhere real in CI, not on
  # every platform.
  huge-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - run: npm run test:slow
